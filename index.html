<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Orionova | Creative Universe</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#020617,#0f172a,#020617);
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
padding:20px 60px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
position:sticky;
top:0;
}

nav h2{
letter-spacing:2px;
}

nav a{
color:white;
margin-left:25px;
text-decoration:none;
transition:0.3s;
}

nav a:hover{
color:#38bdf8;
}

/* HERO */

.hero{
height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:60px;
margin-bottom:20px;
}

.hero p{
color:#cbd5f5;
font-size:20px;
}

/* BUTTON */

.btn{
margin-top:30px;
padding:12px 28px;
background:#38bdf8;
border-radius:8px;
text-decoration:none;
color:black;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

/* PORTFOLIO */

.portfolio{
padding:80px 40px;
text-align:center;
}

.grid{
margin-top:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:#111827;
padding:40px;
border-radius:10px;
transition:0.4s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

/* INSTAGRAM */

.instagram{
text-align:center;
padding:80px;
}

.footer{
text-align:center;
padding:30px;
color:#94a3b8;
}

</style>

</head>

<body>

<nav>

<h2>Orionova</h2>

<div>

<a href="#">Home</a>
<a href="#portfolio">Portfolio</a>
<a href="#instagram">Instagram</a>

</div>

</nav>

<section class="hero">

<h1>Welcome to My Creative Universe</h1>

<p>Design • Ideas • Inspiration</p>

<a class="btn" href="#portfolio">Explore Work</a>

</section>

<section class="portfolio" id="portfolio">

<h2>My Work</h2>

<div class="grid">

<div class="card">Creative Design</div>
<div class="card">Visual Concept</div>
<div class="card">Graphic Project</div>
<div class="card">Brand Idea</div>
<div class="card">Motion Design</div>
<div class="card">Art Direction</div>

</div>

</section>

<section class="instagram" id="instagram">

<h2>Connect With Me</h2>

<br>

<a class="btn" href="https://instagram.com/yourusername" target="_blank">

Visit My Instagram

</a>

</section>

<div class="footer">

© 2026 Orionova — Creative Portfolio

</div>

</body>

</html>
